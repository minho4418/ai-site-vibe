name: CI

# PR마다, 그리고 main 푸시마다 빌드를 자동 검증한다.
# build = `next build` 라서 TypeScript 타입체크도 함께 수행된다(필수 게이트).
# lint 는 아직 기존 코드에 미해결 에러가 있어 비차단(정보성)으로 둔다.
# 그 에러들을 정리하면 lint 잡의 continue-on-error 를 제거해 필수 게이트로 승격하면 된다.

on:
  pull_request:
  push:
    branches: [main]

# 같은 브랜치에서 연속 푸시가 나면 이전 실행을 취소해 러너를 아낀다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (next build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  lint:
    name: Lint (informational)
    runs-on: ubuntu-latest
    # 기존 미해결 lint 에러 때문에 아직은 PR 을 막지 않는다(결과만 보고).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
