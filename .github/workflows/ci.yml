name: CI

# PR마다, 그리고 main 푸시마다 빌드를 자동 검증한다.
# build = `next build` 라서 TypeScript 타입체크도 함께 수행된다(필수 게이트).
# test = `vitest run` (순수 함수 단위 테스트). build 전에 돌려 빠른 피드백을 준다.
# lint = `eslint`. 잔여 에러를 모두 정리해 차단 게이트로 승격함(실패 시 PR 머지 차단).

on:
  pull_request:
  push:
    branches: [main]

# 같은 브랜치에서 연속 푸시가 나면 이전 실행을 취소해 러너를 아낀다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (next build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
