# Dependabot 설정. 보안 취약점은 schedule 과 무관하게 즉시 PR 이 생성된다.
# 일반 버전 업데이트는 매주 월요일에 한 번 묶어서 PR 로 받는다.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # ESLint 10 메이저는 eslint-config-next(번들 eslint-plugin-react)가 아직 미지원이라
    # lint 가 깨진다(ESLint 10 이 context.getFilename 제거 → 플러그인이 호출하다 TypeError).
    # 지원될 때까지 메이저만 막고 마이너/패치(9.x)는 계속 받는다.
    # eslint-config-next 가 ESLint 10 을 지원하면 이 ignore 를 지우고 eslint 와 함께 올린다.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 관련 패키지를 한 PR 로 묶어 검토 부담을 줄임.
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      supabase:
        patterns:
          - "@supabase/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"
